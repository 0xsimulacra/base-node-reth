x-rust-service-build: &rust-service-build
  context: ../..
  dockerfile: etc/docker/Dockerfile.rust-services
  args:
    PROFILE: "${CARGO_PROFILE:-dev}"
    BASE_SUCCINCT_ELF_REQUIRE: "${BASE_SUCCINCT_ELF_REQUIRE:-0}"

x-node-healthcheck: &node-healthcheck
  test: ["CMD-SHELL", "curl -sf -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}' \"http://localhost:$${NODE_HEALTHCHECK_HTTP_PORT}/\" >/dev/null && curl -sf \"http://localhost:$${NODE_HEALTHCHECK_CL_RPC_PORT}/healthz\" >/dev/null"]
  interval: 250ms
  timeout: 1s
  retries: 240
  start_period: 250ms

services:
  setup-l1:
    image: devnet-setup:local
    build:
      context: ../..
      dockerfile: etc/docker/Dockerfile.devnet
    container_name: setup-l1
    env_file: devnet-env
    volumes:
      - ../../.devnet/l1/configs:/output
      - ../../.devnet/l1/reth:/data/l1-reth
      - ../../.devnet/l1/lighthouse:/data/l1-lighthouse
    environment:
      - CHAIN_ID=${L1_CHAIN_ID}
      - SLOT_DURATION=4
      - OUTPUT_DIR=/output
      - SHARED_DIR=/output
      - L1_DATA_DIR=/data
    entrypoint: ["/usr/local/bin/setup-l1.sh"]

  l1-el:
    image: ghcr.io/paradigmxyz/reth:v1.11.4
    container_name: l1-el
    depends_on:
      setup-l1:
        condition: service_completed_successfully
    ports:
      - "${L1_HTTP_PORT}:${L1_HTTP_PORT}"   # HTTP RPC
      - "${L1_WS_PORT}:${L1_WS_PORT}"       # WebSocket
      - "${L1_AUTH_PORT}:${L1_AUTH_PORT}"   # Auth RPC (Engine API)
      - "${L1_P2P_PORT}:${L1_P2P_PORT}"     # P2P
    volumes:
      - ../../.devnet/l1/reth:/data
      - ../../.devnet/l1/configs:/genesis:ro
    entrypoint: /usr/local/bin/reth
    command:
      - node
      - --chain=/genesis/el/genesis.json
      - --datadir=/data
      - --color=never
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L1_HTTP_PORT}
      - --http.api=admin,eth,web3,net,rpc,debug,txpool
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L1_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L1_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --port=${L1_P2P_PORT}
      - --disable-discovery
      - -vvv
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/${L1_HTTP_PORT}"]
      interval: 250ms
      timeout: 1s
      retries: 240
      start_period: 250ms
    restart: unless-stopped

  l1-cl:
    image: sigp/lighthouse:v8.0.1
    container_name: l1-cl
    depends_on:
      setup-l1:
        condition: service_completed_successfully
    ports:
      - "${L1_CL_HTTP_PORT}:${L1_CL_HTTP_PORT}"     # Beacon API
      - "${L1_CL_P2P_PORT}:${L1_CL_P2P_PORT}"       # P2P TCP
      - "${L1_CL_P2P_PORT}:${L1_CL_P2P_PORT}/udp"   # P2P UDP
    volumes:
      - ../../.devnet/l1/lighthouse:/data
      - ../../.devnet/l1/configs:/genesis:ro
    command:
      - lighthouse
      - bn
      - --testnet-dir=/genesis/cl
      - --datadir=/data/beacon
      - --enable-private-discovery
      - --disable-peer-scoring
      - --staking
      - --enr-address=127.0.0.1
      - --enr-udp-port=${L1_CL_P2P_PORT}
      - --enr-tcp-port=${L1_CL_P2P_PORT}
      - --port=${L1_CL_P2P_PORT}
      - --http
      - --http-address=0.0.0.0
      - --http-port=${L1_CL_HTTP_PORT}
      - --http-allow-origin=*
      - --disable-packet-filter
      - --target-peers=0
      - --supernode
      - --execution-endpoint=http://l1-el:${L1_AUTH_PORT}
      - --execution-jwt=/genesis/jwt.hex
      - --always-prepare-payload
      - --prepare-payload-lookahead=8000
      - --suggested-fee-recipient=${FEE_RECIPIENT}
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/${L1_CL_HTTP_PORT}"]
      interval: 250ms
      timeout: 1s
      retries: 240
      start_period: 250ms
    restart: unless-stopped

  l1-vc:
    image: sigp/lighthouse:v8.0.1
    container_name: l1-vc
    depends_on:
      l1-cl:
        condition: service_healthy
    volumes:
      - ../../.devnet/l1/configs:/genesis
    command:
      - lighthouse
      - vc
      - --testnet-dir=/genesis/cl
      - --datadir=/genesis/cl/validator_data
      - --beacon-nodes=http://l1-cl:${L1_CL_HTTP_PORT}
      - --init-slashing-protection
      - --suggested-fee-recipient=${FEE_RECIPIENT}
    restart: unless-stopped

  setup-l2:
    image: devnet-setup:local
    build:
      context: ../..
      dockerfile: etc/docker/Dockerfile.devnet
    container_name: setup-l2
    env_file: devnet-env
    depends_on:
      l1-el:
        condition: service_healthy
    volumes:
      - ../../.devnet:/devnet
      - ../../.devnet/l2/builder:/data/l2-builder
      - ../../.devnet/l2/builder-cl:/data/l2-builder-cl
      - ../../.devnet/l2/client:/data/l2-client
      - ../../.devnet/l2/client-cl:/data/l2-client-cl
    environment:
      - L1_RPC_URL=http://l1-el:${L1_HTTP_PORT}
      - L1_CHAIN_ID=${L1_CHAIN_ID}
      - L2_CHAIN_ID=${L2_CHAIN_ID}
      - L2_BASE_AZUL_BLOCK=${L2_BASE_AZUL_BLOCK-}
      - L2_BASE_BERYL_BLOCK=${L2_BASE_BERYL_BLOCK-}
      - L2_BASE_COBALT_BLOCK=${L2_BASE_COBALT_BLOCK-}
      - OUTPUT_DIR=/devnet/l2/configs
      - L2_DATA_DIR=/data
      - DEPLOYER_ADDR=${DEPLOYER_ADDR}
      - DEPLOYER_KEY=${DEPLOYER_KEY}
      - SEQUENCER_ADDR=${SEQUENCER_ADDR}
      - BATCHER_ADDR=${BATCHER_ADDR}
      - PROPOSER_ADDR=${PROPOSER_ADDR}
      - CHALLENGER_ADDR=${CHALLENGER_ADDR}
      - BUILDER_P2P_KEY=${BUILDER_P2P_KEY}
      - BUILDER_ENODE_ID=${BUILDER_ENODE_ID}
      - L2_EL_BOOTNODE_P2P_KEY=${L2_EL_BOOTNODE_P2P_KEY}
      - L2_EL_BOOTNODE_ENODE_ID=${L2_EL_BOOTNODE_ENODE_ID}
      - L2_EL_BOOTNODE_ENODE=${L2_EL_BOOTNODE_ENODE}
      - L2_CL_BOOTNODE_P2P_KEY=${L2_CL_BOOTNODE_P2P_KEY}
      - L2_CL_BOOTNODE_ENR_PATH=${L2_CL_BOOTNODE_ENR_PATH}
    entrypoint: ["/usr/local/bin/setup-l2.sh"]

  base-bootnode:
    image: base:local
    build:
      <<: *rust-service-build
      target: base
    container_name: base-bootnode
    depends_on:
      setup-l2:
        condition: service_completed_successfully
    ports:
      - "${L2_EL_BOOTNODE_P2P_PORT}:${L2_EL_BOOTNODE_P2P_PORT}/udp" # Discovery
      - "${L2_CL_BOOTNODE_P2P_PORT}:${L2_CL_BOOTNODE_P2P_PORT}"     # Consensus P2P TCP metadata
      - "${L2_CL_BOOTNODE_P2P_PORT}:${L2_CL_BOOTNODE_P2P_PORT}/udp" # Consensus discovery
    volumes:
      - ../../.devnet/l2/el-bootnode:/data
      - ../../.devnet/l2/cl-bootnode-enr:/bootnodes
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - BASE_CHAIN_NAME=dev
      - BASE_CHAIN_L1_CHAIN_ID=${L1_CHAIN_ID}
      - BASE_CHAIN_L2_CHAIN_ID=${L2_CHAIN_ID}
    entrypoint: /app/base
    command:
      - bootnode
      - --chain
      - dev
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --v4-addr=0.0.0.0:${L2_EL_BOOTNODE_P2P_PORT}
      - --nat=extip:${L2_EL_BOOTNODE_ADVERTISE_IP}
      - --p2p-secret-key=/genesis/l2/el-bootnode-p2p-key.txt
      - --p2p.listen.tcp
      - "${L2_CL_BOOTNODE_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_CL_BOOTNODE_P2P_PORT}"
      - --p2p.advertise.ip
      - "${L2_EL_BOOTNODE_ADVERTISE_IP}"
      - --p2p.priv.path
      - /genesis/l2/cl-bootnode-p2p-key.txt
      - --p2p.bootstore
      - /data/bootstore.json
      - --p2p.enr-output
      - "${L2_CL_BOOTNODE_ENR_PATH}"
      - -vvv
    networks:
      default:
        ipv4_address: ${L2_EL_BOOTNODE_ADVERTISE_IP}
    healthcheck:
      test: ["CMD", "test", "-s", "${L2_CL_BOOTNODE_ENR_PATH}"]
      interval: 250ms
      timeout: 1s
      retries: 240
      start_period: 250ms
    restart: unless-stopped

  base-builder:
    image: base:local
    build:
      <<: *rust-service-build
      target: base
    container_name: base-builder
    depends_on:
      setup-l2:
        condition: service_completed_successfully
      base-bootnode:
        condition: service_healthy
    ports:
      - "${L2_BUILDER_HTTP_PORT}:${L2_BUILDER_HTTP_PORT}"           # HTTP RPC
      - "${L2_BUILDER_WS_PORT}:${L2_BUILDER_WS_PORT}"               # WebSocket
      - "${L2_BUILDER_AUTH_PORT}:${L2_BUILDER_AUTH_PORT}"           # Auth RPC (Engine API)
      - "${L2_BUILDER_P2P_PORT}:${L2_BUILDER_P2P_PORT}"             # P2P
      - "${L2_BUILDER_P2P_PORT}:${L2_BUILDER_P2P_PORT}/udp"         # Discovery
      - "${L2_BUILDER_FLASHBLOCKS_PORT}:${L2_BUILDER_FLASHBLOCKS_PORT}"  # Flashblocks
      - "${L2_BUILDER_METRICS_PORT}:${L2_BUILDER_METRICS_PORT}"     # Metrics
      - "${L2_BUILDER_CL_RPC_PORT}:${L2_BUILDER_CL_RPC_PORT}"       # Consensus RPC
      - "${L2_BUILDER_CL_P2P_PORT}:${L2_BUILDER_CL_P2P_PORT}"       # Consensus P2P TCP
      - "${L2_BUILDER_CL_P2P_PORT}:${L2_BUILDER_CL_P2P_PORT}/udp"   # Consensus P2P UDP
    volumes:
      - ../../.devnet/l2/builder:/data
      - ../../.devnet/l2/cl-bootnode-enr:/bootnodes:ro
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - BASE_CHAIN_NAME=dev
      - BASE_CHAIN_L1_CHAIN_ID=${L1_CHAIN_ID}
      - BASE_CHAIN_L2_CHAIN_ID=${L2_CHAIN_ID}
      - NODE_HEALTHCHECK_HTTP_PORT=${L2_BUILDER_HTTP_PORT}
      - NODE_HEALTHCHECK_CL_RPC_PORT=${L2_BUILDER_CL_RPC_PORT}
      - OTEL_SERVICE_NAME=base-builder
    entrypoint: /app/base
    command:
      - sequencer
      - --chain
      - dev
      - --execution-chain=/genesis/l2/genesis.json
      - --datadir=/data
      - --telemetry.sampling-ratio=1
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L2_BUILDER_HTTP_PORT}
      - --http.api=admin,eth,web3,net,rpc,debug,txpool,miner
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L2_BUILDER_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L2_BUILDER_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --auth-ipc.path=/tmp/base-builder-engine.ipc
      - --port=${L2_BUILDER_P2P_PORT}
      - --discovery.port=${L2_BUILDER_P2P_PORT}
      - --nat=extip:${L2_BUILDER_ADVERTISE_IP}
      - --p2p-secret-key-hex=${BUILDER_P2P_KEY}
      - --bootnodes=${L2_EL_BOOTNODE_ENODE}
      - --rollup.discovery.v4
      - --flashblocks.addr=0.0.0.0
      - --flashblocks.port=${L2_BUILDER_FLASHBLOCKS_PORT}
      - --flashblocks.block-time=200
      - --rollup.chain-block-time=2000
      - --metrics=0.0.0.0:${L2_BUILDER_METRICS_PORT}
      - --builder.enable-resource-metering
      - --builder.flashblock-execution-time-budget-us=${METERING_EXECUTION_TIME_US}
      - --builder.block-state-root-gas-limit=${BUILDER_BLOCK_STATE_ROOT_GAS_LIMIT}
      - --builder.max-rejected-txs-per-block=${BUILDER_MAX_REJECTED_TXS_PER_BLOCK}
      - --txpool.nolocals
      - --rollup.txpool-max-inflight-delegated-slots=32768
      - --txpool.pending-max-count=200000
      - --txpool.pending-max-size=512
      - --txpool.basefee-max-count=200000
      - --txpool.basefee-max-size=512
      - --txpool.queued-max-count=200000
      - --txpool.queued-max-size=512
      - --txpool.max-account-slots=256
      - --txpool.max-batch-size=1024
      - --rpc.txfeecap=0
      - --rpc.gascap=600000000
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.port
      - "${L2_BUILDER_CL_RPC_PORT}"
      - --rpc.enable-admin
      - --p2p.listen.tcp
      - "${L2_BUILDER_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_BUILDER_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-builder
      - --p2p.priv.path
      - /genesis/l2/builder-p2p-key.txt
      - --p2p.bootnodes-file
      - "${L2_CL_BOOTNODE_ENR_PATH}"
      - --sequencer.l1-confs
      - "0"
      - --p2p.sequencer.key
      - ${SEQUENCER_KEY}
      - --p2p.scoring
      - Off
      - -vvv
    healthcheck:
      <<: *node-healthcheck
    networks:
      default:
        ipv4_address: ${L2_BUILDER_ADVERTISE_IP}
    restart: unless-stopped

  base-batcher:
    image: base-batcher:local
    build:
      <<: *rust-service-build
      target: batcher
    container_name: base-batcher
    depends_on:
      base-builder:
        condition: service_healthy
    ports:
      - "${BATCHER_METRICS_PORT}:${BATCHER_METRICS_PORT}"   # Metrics
    command:
      - --l1-rpc-url
      - http://l1-el:${L1_HTTP_PORT}
      - --l2-rpc-url
      - http://base-builder:${L2_BUILDER_HTTP_PORT}
      - --rollup-rpc-url
      - http://base-builder:${L2_BUILDER_CL_RPC_PORT}
      - --private-key
      - ${BATCHER_KEY}
      - --max-channel-duration
      - "2"
      - --poll-interval
      - "1"
      - --sub-safety-margin
      - "0"
      - --num-confirmations
      - "1"
      - --metrics.enabled
      - --metrics.addr
      - "0.0.0.0"
      - --metrics.port
      - "${BATCHER_METRICS_PORT}"
    restart: unless-stopped

  base-client:
    image: base:local
    build:
      <<: *rust-service-build
      target: base
    container_name: base-client
    depends_on:
      setup-l2:
        condition: service_completed_successfully
      base-bootnode:
        condition: service_healthy
    ports:
      - "${L2_CLIENT_HTTP_PORT}:${L2_CLIENT_HTTP_PORT}"     # HTTP RPC
      - "${L2_CLIENT_WS_PORT}:${L2_CLIENT_WS_PORT}"         # WebSocket
      - "${L2_CLIENT_AUTH_PORT}:${L2_CLIENT_AUTH_PORT}"     # Auth RPC (Engine API)
      - "${L2_CLIENT_P2P_PORT}:${L2_CLIENT_P2P_PORT}"       # P2P
      - "${L2_CLIENT_P2P_PORT}:${L2_CLIENT_P2P_PORT}/udp"   # Discovery
      - "${L2_CLIENT_METRICS_PORT}:${L2_CLIENT_METRICS_PORT}"  # Metrics
      - "${L2_CLIENT_CL_RPC_PORT}:${L2_CLIENT_CL_RPC_PORT}"     # Consensus RPC
      - "${L2_CLIENT_CL_P2P_PORT}:${L2_CLIENT_CL_P2P_PORT}"     # Consensus P2P TCP
      - "${L2_CLIENT_CL_P2P_PORT}:${L2_CLIENT_CL_P2P_PORT}/udp" # Consensus P2P UDP
    volumes:
      - ../../.devnet/l2/client:/data
      - ../../.devnet/l2/cl-bootnode-enr:/bootnodes:ro
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - BASE_CHAIN_NAME=dev
      - BASE_CHAIN_L1_CHAIN_ID=${L1_CHAIN_ID}
      - BASE_CHAIN_L2_CHAIN_ID=${L2_CHAIN_ID}
      - NODE_HEALTHCHECK_HTTP_PORT=${L2_CLIENT_HTTP_PORT}
      - NODE_HEALTHCHECK_CL_RPC_PORT=${L2_CLIENT_CL_RPC_PORT}
      - OTEL_SERVICE_NAME=base-client
    entrypoint: /app/base
    command:
      - rpc
      - --chain
      - dev
      - --execution-chain=/genesis/l2/genesis.json
      - --datadir=/data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L2_CLIENT_HTTP_PORT}
      # Devnet keeps `miner` on HTTP so local services can read and update
      # the dynamic DA and gas-limit knobs end-to-end.
      - --http.api=admin,eth,web3,net,rpc,debug,txpool,miner
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L2_CLIENT_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L2_CLIENT_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --auth-ipc.path=/tmp/base-client-engine.ipc
      - --port=${L2_CLIENT_P2P_PORT}
      - --discovery.port=${L2_CLIENT_P2P_PORT}
      - --nat=extip:${L2_CLIENT_ADVERTISE_IP}
      - --metrics=0.0.0.0:${L2_CLIENT_METRICS_PORT}
      - --txpool.nolocals
      - --rollup.txpool-max-inflight-delegated-slots=32768
      - --txpool.pending-max-count=200000
      - --txpool.pending-max-size=512
      - --txpool.basefee-max-count=200000
      - --txpool.basefee-max-size=512
      - --txpool.queued-max-count=200000
      - --txpool.queued-max-size=512
      - --txpool.max-account-slots=256
      - --txpool.max-batch-size=1024
      - --rpc.txfeecap=0
      - --rpc.gascap=600000000
      - --rpc.eth-proof-window=1209600
      - --flashblocks-url=ws://base-builder:${L2_BUILDER_FLASHBLOCKS_PORT}
      - --bootnodes=${L2_EL_BOOTNODE_ENODE}
      - --rollup.discovery.v4
      - --rpc.forwarding-endpoint=http://base-builder:${L2_BUILDER_HTTP_PORT}
      - --enable-metering
      - --metering.gas-limit=${METERING_GAS_LIMIT}
      - --metering.execution-time-us=${METERING_EXECUTION_TIME_US}
      - --metering.state-root-time-us=${METERING_STATE_ROOT_TIME_US}
      - --metering.da-bytes=${METERING_DA_BYTES}
      - --metering.target-flashblocks-per-block=${METERING_TARGET_FLASHBLOCKS_PER_BLOCK}
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.port
      - "${L2_CLIENT_CL_RPC_PORT}"
      - --p2p.listen.tcp
      - "${L2_CLIENT_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_CLIENT_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-client
      - --p2p.bootnodes-file
      - "${L2_CL_BOOTNODE_ENR_PATH}"
      - --p2p.scoring
      - Off
      - --l1.verifier-confs
      - "${BASE_NODE_VERIFIER_L1_CONFS}"
      - -vvv
    healthcheck:
      <<: *node-healthcheck
    networks:
      default:
        ipv4_address: ${L2_CLIENT_ADVERTISE_IP}
    restart: unless-stopped

  base-rpc:
    image: base:local
    build:
      <<: *rust-service-build
      target: base
    container_name: base-rpc
    depends_on:
      setup-l2:
        condition: service_completed_successfully
      base-bootnode:
        condition: service_healthy
      base-builder:
        condition: service_healthy
    ports:
      - "${L2_BASE_RPC_HTTP_PORT}:${L2_BASE_RPC_HTTP_PORT}"     # HTTP RPC
      - "${L2_BASE_RPC_WS_PORT}:${L2_BASE_RPC_WS_PORT}"         # WebSocket
      - "${L2_BASE_RPC_AUTH_PORT}:${L2_BASE_RPC_AUTH_PORT}"     # Auth RPC (Engine API)
      - "${L2_BASE_RPC_P2P_PORT}:${L2_BASE_RPC_P2P_PORT}"       # P2P
      - "${L2_BASE_RPC_P2P_PORT}:${L2_BASE_RPC_P2P_PORT}/udp"   # Discovery
      - "${L2_BASE_RPC_METRICS_PORT}:${L2_BASE_RPC_METRICS_PORT}"  # Metrics
      - "${L2_BASE_RPC_CL_RPC_PORT}:${L2_BASE_RPC_CL_RPC_PORT}"     # Consensus RPC
      - "${L2_BASE_RPC_CL_P2P_PORT}:${L2_BASE_RPC_CL_P2P_PORT}"     # Consensus P2P TCP
      - "${L2_BASE_RPC_CL_P2P_PORT}:${L2_BASE_RPC_CL_P2P_PORT}/udp" # Consensus P2P UDP
    volumes:
      - ../../.devnet/l2/base-rpc:/data
      - ../../.devnet/l2/cl-bootnode-enr:/bootnodes:ro
      - ../../.devnet/l1/configs:/genesis:ro
      - ../../.devnet/l2/configs:/genesis/l2:ro
    environment:
      - BASE_CHAIN_NAME=dev
      - BASE_CHAIN_L1_CHAIN_ID=${L1_CHAIN_ID}
      - BASE_CHAIN_L2_CHAIN_ID=${L2_CHAIN_ID}
      - NODE_HEALTHCHECK_HTTP_PORT=${L2_BASE_RPC_HTTP_PORT}
      - NODE_HEALTHCHECK_CL_RPC_PORT=${L2_BASE_RPC_CL_RPC_PORT}
      - OTEL_SERVICE_NAME=base-rpc
    entrypoint: /app/base
    command:
      - rpc
      - --chain
      - dev
      - --execution-chain=/genesis/l2/genesis.json
      - --datadir=/data
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${L2_BASE_RPC_HTTP_PORT}
      # Devnet keeps `miner` on HTTP so local services can read and update
      # the dynamic DA and gas-limit knobs end-to-end.
      - --http.api=admin,eth,web3,net,rpc,debug,txpool,miner
      - --http.corsdomain=*
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${L2_BASE_RPC_WS_PORT}
      - --ws.api=eth,web3,net,txpool,debug
      - --ws.origins=*
      - --authrpc.port=${L2_BASE_RPC_AUTH_PORT}
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/genesis/jwt.hex
      - --auth-ipc.path=/tmp/base-engine.ipc
      - --port=${L2_BASE_RPC_P2P_PORT}
      - --discovery.port=${L2_BASE_RPC_P2P_PORT}
      - --nat=extip:${L2_BASE_RPC_ADVERTISE_IP}
      - --metrics=0.0.0.0:${L2_BASE_RPC_METRICS_PORT}
      - --txpool.nolocals
      - --rpc.txfeecap=0
      - --rpc.gascap=600000000
      - --rpc.eth-proof-window=1209600
      - --bootnodes=${L2_EL_BOOTNODE_ENODE}
      - --rollup.discovery.v4
      - --l1-eth-rpc
      - http://l1-el:${L1_HTTP_PORT}
      - --l1-beacon
      - http://l1-cl:${L1_CL_HTTP_PORT}
      - --l2-config-file
      - /genesis/l2/rollup.json
      - --l1-config-file
      - /genesis/el/chain-config.json
      - --l1-slot-duration-override
      - "4"
      - --rpc.port
      - "${L2_BASE_RPC_CL_RPC_PORT}"
      - --rpc.enable-admin
      - --p2p.listen.tcp
      - "${L2_BASE_RPC_CL_P2P_PORT}"
      - --p2p.listen.udp
      - "${L2_BASE_RPC_CL_P2P_PORT}"
      - --p2p.advertise.ip
      - base-rpc
      - --p2p.bootnodes-file
      - "${L2_CL_BOOTNODE_ENR_PATH}"
      - --p2p.scoring
      - Off
      - --l1.verifier-confs
      - "${BASE_NODE_VERIFIER_L1_CONFS}"
      - -vvv
    healthcheck:
      <<: *node-healthcheck
    networks:
      default:
        ipv4_address: ${L2_BASE_RPC_ADVERTISE_IP}
    restart: unless-stopped

  zk-prover-postgres:
    image: postgres:17-alpine
    container_name: zk-prover-postgres
    ports:
      - "${ZK_PROVER_POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_DB=prover
      - POSTGRES_USER=prover
      - POSTGRES_PASSWORD=prover
    volumes:
      - ../../.devnet/zk-prover/postgres:/var/lib/postgresql/data
      - ../../crates/proof/zk/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prover -d prover"]
      interval: 250ms
      timeout: 1s
      retries: 240
      start_period: 250ms
    restart: unless-stopped

  base-prover-zk:
    image: base-prover-zk:local
    build:
      <<: *rust-service-build
      target: zk-prover
    container_name: base-prover-zk
    depends_on:
      l1-el:
        condition: service_healthy
      l1-cl:
        condition: service_healthy
      base-rpc:
        condition: service_healthy
      zk-prover-postgres:
        condition: service_healthy
    ports:
      - "${ZK_PROVER_GRPC_PORT}:9000"
    volumes:
      - ../../.devnet/l1/configs/el/chain-config.json:/app/configs/L1/${L1_CHAIN_ID}.json:ro
    environment:
      - SP1_PROVER=${SP1_PROVER:-dry-run}
      - SP1_CLUSTER_API_ENDPOINT=${SP1_CLUSTER_API_ENDPOINT:-}
      - SP1_CLUSTER_TIMEOUT_HOURS=${SP1_CLUSTER_TIMEOUT_HOURS:-24}
      - CLI_S3_BUCKET=${CLI_S3_BUCKET:-}
      - CLI_S3_REGION=${CLI_S3_REGION:-us-east-1}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - PROXY_ENABLE=${PROXY_ENABLE:-false}
      - RUST_LOG=${RUST_LOG:-}
      - GRPC_LISTEN_ADDR=0.0.0.0:9000
      - BASE_CONSENSUS_ADDRESS=http://base-rpc:${L2_BASE_RPC_CL_RPC_PORT}
      - L1_NODE_ADDRESS=http://l1-el:${L1_HTTP_PORT}
      - L1_BEACON_ADDRESS=http://l1-cl:${L1_CL_HTTP_PORT}
      - L2_NODE_ADDRESS=http://base-rpc:${L2_BASE_RPC_HTTP_PORT}
      - DEFAULT_SEQUENCE_WINDOW=${DEFAULT_SEQUENCE_WINDOW:-50}
      - POSTGRES_HOST=zk-prover-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=prover
      - POSTGRES_USER=prover
      - POSTGRES_PASSWORD=prover
      - POSTGRES_SSLMODE=disable
      - OTEL_SERVICE_NAME=base-prover-zk
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9000"]
      interval: 250ms
      timeout: 1s
      retries: 240
      start_period: 250ms
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    ports:
      - "3001:16686"  # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - MEMORY_MAX_TRACES=1000
    restart: unless-stopped

  pyroscope:
    image: grafana/pyroscope:1.18.1
    container_name: pyroscope
    profiles: ["profiling"]
    ports:
      - "4040:4040"
    command:
      - "server"
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.13.1
    container_name: alloy
    profiles: ["profiling"]
    privileged: true
    pid: host
    volumes:
      - ../scripts/devnet/alloy.config:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    depends_on:
      - pyroscope
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../scripts/devnet/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_INSTALL_PLUGINS=grafana-pyroscope-app
    volumes:
      - ../scripts/devnet/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../scripts/devnet/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

networks:
  # Fixed bootnode ENRs depend on stable in-network IPs. Override
  # L2_BOOTNODE_DOCKER_SUBNET if this subnet conflicts with the host.
  default:
    ipam:
      config:
        - subnet: ${L2_BOOTNODE_DOCKER_SUBNET}
