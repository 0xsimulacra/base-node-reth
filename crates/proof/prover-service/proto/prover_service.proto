syntax = "proto3";

package prover_service;

import "google/protobuf/timestamp.proto";

service ProverService {
  rpc SubmitProof(SubmitProofRequest) returns (SubmitProofResponse);
  rpc GetProof(GetProofRequest) returns (GetProofResponse);
  rpc ListProofs(ListProofsRequest) returns (ListProofsResponse);
  rpc GetProofJob(GetProofJobRequest) returns (GetProofJobResponse);
  rpc ClaimProofJob(ClaimProofJobRequest) returns (ClaimProofJobResponse);
  rpc HeartbeatProofJob(HeartbeatProofJobRequest) returns (HeartbeatProofJobResponse);
  rpc CompleteProofJob(CompleteProofJobRequest) returns (CompleteProofJobResponse);
  rpc FailProofJob(FailProofJobRequest) returns (FailProofJobResponse);
}

enum ProofType {
  PROOF_TYPE_UNSPECIFIED = 0;
  PROOF_TYPE_COMPRESSED = 1;
  PROOF_TYPE_SNARK_GROTH16 = 2;
  PROOF_TYPE_TEE = 3;
}

enum TeeKind {
  TEE_KIND_UNSPECIFIED = 0;
  TEE_KIND_AWS_NITRO = 1;
}

enum ZkVm {
  ZK_VM_UNSPECIFIED = 0;
  ZK_VM_SP1 = 1;
}

enum ProofStatus {
  PROOF_STATUS_UNSPECIFIED = 0;
  PROOF_STATUS_QUEUED = 1;
  PROOF_STATUS_RUNNING = 2;
  PROOF_STATUS_SUCCEEDED = 3;
  PROOF_STATUS_FAILED = 4;
}

enum ProofJobStatus {
  PROOF_JOB_STATUS_UNSPECIFIED = 0;
  PROOF_JOB_STATUS_QUEUED = 1;
  PROOF_JOB_STATUS_LEASED = 2;
  PROOF_JOB_STATUS_LEASE_EXPIRED = 3;
  PROOF_JOB_STATUS_SUCCEEDED = 4;
  PROOF_JOB_STATUS_FAILED = 5;
}

message SubmitProofRequest {
  ProofRequest proof = 1;
}

message SubmitProofResponse {
  string session_id = 1;
}

message ProofRequest {
  optional string session_id = 1;

  oneof request {
    // Request a compressed ZK proof. Maps to PROOF_TYPE_COMPRESSED.
    ZkProofRequest compressed = 2;
    // Request a Groth16 SNARK proof. Maps to PROOF_TYPE_SNARK_GROTH16.
    SnarkGroth16ProofRequest snark_groth16 = 3;
    // Request a TEE proof. Maps to PROOF_TYPE_TEE.
    TeeProofRequest tee = 4;
  }
}

message ZkProofRequest {
  uint64 start_block_number = 1;
  uint64 number_of_blocks_to_prove = 2;
  optional uint64 sequence_window = 3;
  optional string l1_head = 4;
  optional uint64 intermediate_root_interval = 5;
  ZkVm zk_vm = 6;
}

message SnarkGroth16ProofRequest {
  ZkProofRequest proof = 1;
  string prover_address = 2;
}

message TeeProofRequest {
  // Servers must validate exact byte lengths before using any byte field.
  bytes l1_head = 1; // 32 bytes.
  bytes agreed_l2_head_hash = 2; // 32 bytes.
  bytes agreed_l2_output_root = 3; // 32 bytes.
  bytes claimed_l2_output_root = 4; // 32 bytes.
  uint64 claimed_l2_block_number = 5;
  bytes proposer = 6; // 20 bytes.
  uint64 intermediate_block_interval = 7;
  uint64 l1_head_number = 8;
  bytes image_hash = 9; // 32 bytes.
  TeeKind tee_kind = 10;
}

message ProofResult {
  oneof result {
    ZkProofResult compressed = 1;
    SnarkGroth16ProofResult snark_groth16 = 2;
    TeeProofResult tee = 3;
  }
}

message ZkProofResult {
  ZkVm zk_vm = 1;
  bytes proof = 2;
}

message SnarkGroth16ProofResult {
  ZkProofResult proof = 1;
}

message TeeProofResult {
  TeeProposal aggregate_proposal = 1;
  repeated TeeProposal proposals = 2;
  TeeKind tee_kind = 3;
}

message TeeProposal {
  bytes output_root = 1; // 32 bytes.
  bytes signature = 2; // 65 bytes.
  bytes l1_origin_hash = 3; // 32 bytes.
  uint64 l1_origin_number = 4;
  uint64 l2_block_number = 5;
  bytes prev_output_root = 6; // 32 bytes.
  bytes config_hash = 7; // 32 bytes.
}

message GetProofRequest {
  string session_id = 1;
}

message GetProofResponse {
  ProofStatus status = 1;
  optional string error_message = 2;
  ProofResult result = 3;
}

message ListProofsRequest {
  uint64 offset = 1;
  // A zero value uses the server default; values greater than 1000 must be rejected.
  uint32 limit = 2;
  optional ProofStatus status_filter = 3;
}

message ProofSummary {
  string session_id = 1;
  ProofType proof_type = 2;
  ProofStatus status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  google.protobuf.Timestamp completed_at = 6;
  optional string error_message = 7;
  TeeKind tee_kind = 8;
  ZkVm zk_vm = 9;
}

message ListProofsResponse {
  repeated ProofSummary proofs = 1;
  uint64 total_count = 2;
}

message ProofJob {
  string session_id = 1;
  ProofJobStatus status = 2;
  ProofRequest request = 3;
  uint32 attempt = 4;
  optional string lease_id = 5;
  optional string worker_id = 6;
  google.protobuf.Timestamp lease_expires_at = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp completed_at = 10;
  optional string error_message = 11;
}

message GetProofJobRequest {
  string session_id = 1;
}

message GetProofJobResponse {
  ProofJob job = 1;
}

message ClaimProofJobRequest {
  ProofType proof_type = 1;
  string worker_id = 2;
  // A zero value uses the server default; values greater than 3600 must be rejected.
  uint32 lease_duration_seconds = 3;
  // Empty means no TEE subtype restriction. Used only when proof_type is PROOF_TYPE_TEE.
  repeated TeeKind tee_kinds = 4;
  // Empty means no ZK VM subtype restriction. Used only for ZK proof types.
  repeated ZkVm zk_vms = 5;
}

message ClaimProofJobResponse {
  bool claimed = 1;
  ProofJob job = 2;
}

message HeartbeatProofJobRequest {
  string session_id = 1;
  string lease_id = 2;
  string worker_id = 3;
  // A zero value uses the server default; values greater than 3600 must be rejected.
  uint32 lease_duration_seconds = 4;
}

message HeartbeatProofJobResponse {
  bool accepted = 1;
  ProofJob job = 2;
}

message CompleteProofJobRequest {
  string session_id = 1;
  string lease_id = 2;
  string worker_id = 3;
  ProofResult result = 4;
}

message CompleteProofJobResponse {
  ProofJob job = 1;
}

message FailProofJobRequest {
  string session_id = 1;
  string lease_id = 2;
  string worker_id = 3;
  string error_message = 4;
  bool retryable = 5;
}

message FailProofJobResponse {
  ProofJob job = 1;
  bool will_retry = 2;
}
