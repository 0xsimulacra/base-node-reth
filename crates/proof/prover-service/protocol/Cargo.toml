[package]
name = "base-prover-service-protocol"
description = "Protocol types and JSON-RPC traits for the Base prover service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Primitive value types
alloy-primitives = { workspace = true, features = ["serde"] }
base-proof-primitives = { workspace = true, features = ["serde"] }

# Serialization
serde = { workspace = true, features = ["derive"] }

# Time
chrono = { workspace = true, features = ["serde"] }

# RPC
jsonrpsee = { workspace = true, optional = true }

# Misc
uuid = { workspace = true, features = ["v5"] }

[dev-dependencies]
serde_json = { workspace = true, features = ["std"] }

[lints]
workspace = true

[features]
default = []
rpc-client = [ "dep:jsonrpsee", "jsonrpsee/http-client", "jsonrpsee/macros" ]
rpc-server = [ "dep:jsonrpsee", "jsonrpsee/macros", "jsonrpsee/server" ]
