[package]
name = "base-prover-service-client"
description = "Role-specific JSON-RPC clients for the Base prover service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
# Protocol
base-prover-service-protocol = { workspace = true, features = ["rpc-client"] }

# RPC
jsonrpsee = { workspace = true, features = ["http-client"] }

# Async
backon.workspace = true
async-trait.workspace = true

# URL parsing
url.workspace = true

# Error handling
thiserror.workspace = true

# Observability
tracing.workspace = true

[dev-dependencies]
# Protocol
base-prover-service-protocol = { workspace = true, features = ["rpc-server"] }

# RPC
jsonrpsee = { workspace = true, features = ["server"] }

# Async
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

# Time
chrono.workspace = true

# Testing
rstest.workspace = true

[lints]
workspace = true
