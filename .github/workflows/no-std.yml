name: no_std

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: read

jobs:
  check-no-std:
    name: no_std
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          mold: "true"
          rust-cache-shared-key: "no-std"
          rust-cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Add riscv target
        shell: bash
        run: rustup target add riscv32imac-unknown-none-elf

      - name: check
        run: ./etc/scripts/ci/check-no-std.sh

  check-no-std-proof:
    name: no_std (proof)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup
        with:
          toolchain: "nightly"
          components: "rust-src"
          mold: "true"
          rust-cache-shared-key: "no-std-proof"
          rust-cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Add riscv target
        shell: bash
        run: rustup target add riscv32imac-unknown-none-elf

      - name: check
        run: ./etc/scripts/ci/check-no-std-proof.sh
