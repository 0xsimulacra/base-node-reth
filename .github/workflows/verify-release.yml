name: Verify Release

on:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to verify. Leave blank to verify the latest release.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify-signatures:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify release signatures
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          args=()
          if [[ -n "$RELEASE_TAG" ]]; then
            args+=(--install "$RELEASE_TAG")
          fi

          bash baseup/baseup verify-release "${args[@]}"
