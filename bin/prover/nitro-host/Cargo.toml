[package]
name = "base-prover-nitro-host"
description = "TEE prover host worker (AWS Nitro Enclaves)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[[bin]]
name = "base-prover-nitro-host"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# Workspace – Nitro host
base-common-chains.workspace = true
base-proof-tee-nitro-host.workspace = true
base-prover-service-client.workspace = true
base-proof-host = { workspace = true, features = ["metrics"] }
base-proof-tee-nitro-enclave = { workspace = true, optional = true }

# CLI / errors
eyre.workspace = true
base-cli-utils.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
serde = { workspace = true, features = ["derive", "std"] }

# Async
tokio-util.workspace = true
tokio = { workspace = true, features = ["full"] }

# Primitives / identifiers
alloy-primitives.workspace = true
uuid = { workspace = true, features = ["v4"] }

# Tracing
tracing.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
base-proof-tee-nitro-enclave.workspace = true

[features]
local = ["dep:base-proof-tee-nitro-enclave"]
